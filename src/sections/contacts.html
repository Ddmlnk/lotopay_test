<section class="contacts-section" id="contacts">
  <div class="container">
    <h2 class="contacts-title">Зв'яжись з нами</h2>
    <p class="contacts-subtitle">
      Хочеш заказати виступ або маєш питання? Пиши!
    </p>

    <div class="contacts-content">
      <form class="contacts-form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Ім'я</label>
            <input type="text" id="name" name="name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" />
          </div>
        </div>

        <div class="form-group">
          <label for="message">Повідомлення</label>
          <textarea
            id="message"
            name="message"
            placeholder="Розкажи про свої ідеї..."
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">Відправити</button>
      </form>

      <div class="contacts-map">
        <h3 class="map-title">Наше місцезнаходження</h3>

        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d34805.25902808624!2d30.58115844736337!3d50.413646819569074!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x40d4cf76e65d4dad%3A0x247b398f405dff8f!2z0KDQvtC00LjQvdCwLdCc0LDRgtGM!5e0!3m2!1sru!2sua!4v1776079637873!5m2!1sru!2sua"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>
  </div>
</section>
